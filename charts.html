<html>

<head>
    <title>AfH Supernova Activity</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge;chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="image/x-icon" rel="shortcut icon" href="./favicon.ico">
    <link type="text/css" rel="stylesheet" href="js9support.css">
    <link type="text/css" rel="stylesheet" href="js9.css">
    <link type="text/css" rel="stylesheet" href="charts.css">
</head>

<body>
    <div id="chartContainer" class="chartWrapper">


    </div>



    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <script>
        generateChartDivs();
        //This whole thing is wrong... turns out we were supposed to have a separate graph for each light curve, which the 
        //magitude comes from. The spectra is part two. Really, really wish I could use components properly for this thing.

        var line = 6150
        var rowCounter = 1;

        //https://developers.google.com/chart/interactive/docs/basic_interactivity for details on click interactions
        //we'll need this for allowing people to get numbers from the peak

        google.charts.load('current', { 'packages': ['corechart'] });
        google.charts.setOnLoadCallback(drawCall);
        var options = {
            title: 'Supernova',
            legend: 'none',
            vAxis: {
                title: 'Flux (lm)',
                format: 'scientific'
            },
            hAxis: {
                title: 'Wavelength (nm)',
                viewWindowMode: 'maximized',
                format: '#'
            },
            width: '700px',
            height: '300px'
        };

        //URL for lightcurve: https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0

        function drawCall() {
            //Spectra charts

            draw("chart1", "1994s Spectrum", "https://docs.google.com/spreadsheets/d/1oXcuRQq5HheZ6mfmhCmOYIQNgWxzW_Okhx7FpnN884U/edit#gid=0", "spectrum");
            draw("chart2", "1996bo Spectrum", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing", "spectrum");
            draw("chart3", "test Spectrum", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing", "spectrum");
            draw("chart4", "test Spectrum", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing", "spectrum");
            draw("chart5", "test Spectrum", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing", "spectrum");
            draw("chart6", "test Spectrum", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing", "spectrum");
            draw("chart7", "test Spectrum", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing", "spectrum");
            draw("chart8", "test Spectrum", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing", "spectrum");
            draw("chart9", "test Spectrum", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing", "spectrum");
            draw("chart10", "test Spectrum", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing", "spectrum");

            //Light curve charts
            draw("chart1b", "1994s Light Curve", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0", "lightcurve");
            draw("chart2b", "1994s Light Curve", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0", "lightcurve");
            draw("chart3b", "1994s Light Curve", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0", "lightcurve");
            draw("chart4b", "1994s Light Curve", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0", "lightcurve");
            draw("chart5b", "1994s Light Curve", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0", "lightcurve");
            draw("chart6b", "1994s Light Curve", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0", "lightcurve");
            draw("chart7b", "1994s Light Curve", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0", "lightcurve");
            draw("chart8b", "1994s Light Curve", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0", "lightcurve");
            draw("chart9b", "1994s Light Curve", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0", "lightcurve");
            draw("chart10b", "1994s Light Curve", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0", "lightcurve");

        }

        function draw(div, title, url, type) {
            //Create table element first, so we can call it
            var table = document.getElementById("resultsTable");
            var row = table.insertRow(rowCounter);
            var cell0 = row.insertCell(0);
            cell0.innerHTML = title;
            var cell1 = row.insertCell(1);
            eval("cell1.id = '" + div + "v2';");
            var cell2 = row.insertCell(2);
            eval("cell2.id = '" + div + "v1';");
            var cell3 = row.insertCell(3);
            eval("cell3.id = '" + div + "c1';");
            var cell4 = row.insertCell(4);
            eval("cell4.id = '" + div + "c2';");
            var cell5 = row.insertCell(5);
            eval("cell5.id = '" + div + "c3';");
            var cell6 = row.insertCell(6);
            eval("cell6.id = '" + div + "c4';");
            rowCounter = 1 + rowCounter;


            eval("q" + div + " = new google.visualization.Query(\"" + url + "\"); ");
            eval("q" + div + ".send(draw);");

            function draw(response) {
                options["title"] = title
                if (type == "lightcurve") {
                    options["hAxis"]["title"] = "Age";
                    options["vAxis"] = {
                        title: "Magnitude",
                        format: "#",
                        direction: "-1"
                    }
                } else {
                    options["vAxis"] = {
                        title: "Flux (lm)",
                        direction: "",
                        format: "scientific",
                    }
                    options["hAxis"]["title"] = "Wavelength (nm)";
                }

                var data = response.getDataTable();
                eval(div + "= new google.visualization.ScatterChart(document.getElementById(\"" + div + "\"));");
                function selectHandlerSpectra() {
                    eval("var selectedItem =" + div + ".getSelection()[0];")
                    if (selectedItem) {
                        var wavelength = data.getValue(selectedItem.row, 0);
                        eval("document.getElementById('" + div + "value" + "').innerHTML = wavelength;");
                    } else (alert('No selecteditem'))
                }

                function selectHandlerLight() {
                    eval("var selectedItem =" + div + ".getSelection()[0];")
                    if (selectedItem) {
                        var wavelength = data.getValue(selectedItem.row, 1);
                        eval("document.getElementById('" + div + "value" + "').innerHTML = wavelength;");
                    } else (alert('No selecteditem'))
                }

                if (type == "lightcurve") {
                    eval("google.visualization.events.addListener(" + div + ", 'select', selectHandlerLight);");
                } else {
                    eval("google.visualization.events.addListener(" + div + ", 'select', selectHandlerSpectra);");
                }
                eval(div + ".draw(data, options);");
                eval("drawVAxisLine(" + div + ", line)");
                if (type == "spectrum") {
                    eval(`document.getElementById("${div}").classList.add("hidden")`);
                }
            }


        }

        function drawVAxisLine(chart, value) {
            var layout = chart.getChartLayoutInterface();
            var chartArea = layout.getChartAreaBoundingBox();

            var svg = chart.getContainer().getElementsByTagName('svg')[0];
            var xLoc = layout.getXLocation(value)
            svg.appendChild(createLine(xLoc, chartArea.top + chartArea.height, xLoc, chartArea.top, '#ff0000', 2)); // axis line 
        }

        function createLine(x1, y1, x2, y2, color, w) {
            var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.setAttribute('stroke', color);
            line.setAttribute('stroke-width', w);
            return line;
        }

        //sets wavelength
        function saveWavelength(div) {
            eval("var value = document.getElementById('" + div + "value').innerHTML;");
            eval("document.getElementById('" + div + "v1').innerHTML = '" + value + "'")
        }

        //sets flx
        function saveFlux(div) {
            eval("var value = document.getElementById('" + div + "bvalue').innerHTML;");
            eval("document.getElementById('" + div + "v2').innerHTML = '" + value + "'");
        }

        function showLight(chart) {
            eval(`document.getElementById("${chart}b").classList.remove("hidden");
                document.getElementById("${chart}").classList.add("hidden");
                
                document.getElementById("${chart}lightbutton").classList.add("underline");
                document.getElementById("${chart}spectrabutton").classList.remove("underline");
                
                `);
        }

        function showSpectra(chart) {
            eval(`document.getElementById("${chart}").classList.remove("hidden");
                document.getElementById("${chart}b").classList.add("hidden");

                document.getElementById("${chart}lightbutton").classList.remove("underline");
                document.getElementById("${chart}spectrabutton").classList.add("underline");
                
                `);
        }

        function generateChartDivs() {
            var content = "";

            for (var i = 1; i <= 10; i++) {
                var singleContent =
                    `<div>
            <div id="chart${i}" style="width: 700px; height: 300px;"></div>
            <div id="chart${i}b" style="width: 700px; height: 300px;" ></div>
            <div class="label">
            <span onclick="showLight('chart${i}')" class="button underline" id="chart${i}lightbutton">Light Curve</span> | <span onclick="showSpectra('chart${i}')" class="button" id="chart${i}spectrabutton"> Spectra</span><br/>
            </div>
            <div class="valueDiv">
            <span>Magnitude: </span>
            <span id="chart${i}bvalue" class="valueText"></span>
            <span onClick="saveFlux('chart${i}')" class="button">Save</span>
            <br />
            <span>Wavelength: </span><span id="chart${i}value" class="valueText"></span>
            <span onClick="saveWavelength('chart${i}')" class="button">Save</span>
            </div>
        </div>`

                content = content + singleContent;
            }

            document.getElementById("chartContainer").innerHTML = content;

        }

    </script>


    <div>
        <br /><br /><br />
        <table id="resultsTable">
            <tr>
                <th></th>
                <th>Magnitude</th>
                <th>Wavelength</th>
                <th>Calc 1</th>
                <th>Calc 2</th>
                <th>Calc 3</th>
                <th>Calc 4</th>
            </tr>

        </table>
    </div>

</body>

</html>
