<body>
    <div id="chartContainer" class="chartWrapper">

    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <script>
        generateChartDivs();
        //This whole thing is wrong... turns out we were supposed to have a separate graph for each light curve, which the 
        //magitude comes from. The spectra is part two. Really, really wish I could use components properly for this thing.

        var line = 6150
        var rowCounter = 1;

        //https://developers.google.com/chart/interactive/docs/basic_interactivity for details on click interactions
        //we'll need this for allowing people to get numbers from the peak

        google.charts.load('current', { 'packages': ['corechart'] });
        google.charts.setOnLoadCallback(drawCall);
        var options = {
            title: 'Supernova',
            legend: 'none',
            vAxis: {
                title: 'Flux (lm)',
                format: 'scientific'
            },
            hAxis: {
                title: 'Wavelength (nm)',
                viewWindowMode: 'maximized',
                format: '#'
            }
        };

        //URL for lightcurve: https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0

        function drawCall() {
//Spectra charts

            draw("chart1", "1994s", "https://docs.google.com/spreadsheets/d/1oXcuRQq5HheZ6mfmhCmOYIQNgWxzW_Okhx7FpnN884U/edit#gid=0");
            draw("chart2", "1996bo", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing");
            draw("chart3", "test", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing");
            draw("chart4", "test", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing");
            draw("chart5", "test", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing");
            draw("chart6", "test", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing");
            draw("chart7", "test", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing");
            draw("chart8", "test", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing");
            draw("chart9", "test", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing");
            draw("chart10", "test", "https://docs.google.com/spreadsheets/d/1c3TSBmneobBq7fXICNLvOkNrDpubM_6Wu-ad3m59iF4/edit?usp=sharing");

            draw("chart1b", "1994s", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0");
            draw("chart2b", "1994s", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0");
            draw("chart3b", "1994s", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0");
            draw("chart4b", "1994s", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0");
            draw("chart5b", "1994s", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0");
            draw("chart6b", "1994s", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0");
            draw("chart7b", "1994s", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0");
            draw("chart8b", "1994s", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0");
            draw("chart9b", "1994s", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0");
            draw("chart10b", "1994s", "https://docs.google.com/spreadsheets/d/1LWOxc-QpEY7iUFGQ6sR99eYY3VslGP1JsHw5GtDkRAU/edit#gid=0");

        }

        function draw(div, title, url) {
            //Create table element first, so we can call it
            var table = document.getElementById("resultsTable");
            var row = table.insertRow(rowCounter);
            var cell0 = row.insertCell(0);
            cell0.innerHTML = title;
            var cell1 = row.insertCell(1);
            eval("cell1.id = '" + div + "v2';");
            var cell2 = row.insertCell(2);
            eval("cell2.id = '" + div + "v1';");
            var cell3 = row.insertCell(3);
            eval("cell3.id = '" + div + "c1';");
            var cell4 = row.insertCell(4);
            eval("cell4.id = '" + div + "c2';");
            var cell5 = row.insertCell(5);
            eval("cell5.id = '" + div + "c3';");
            var cell6 = row.insertCell(6);
            eval("cell6.id = '" + div + "c4';");
            rowCounter = 1 + rowCounter;


            eval("q" + div + " = new google.visualization.Query(\"" + url + "\"); ");
            eval("q" + div + ".send(draw);");

            function draw(response) {
                options["title"] = title
                var data = response.getDataTable();
                eval(div + "= new google.visualization.ScatterChart(document.getElementById(\"" + div + "\"));");
                function selectHandler() {
                    eval("var selectedItem =" + div + ".getSelection()[0];")
                    if (selectedItem) {
                        var flux = data.getValue(selectedItem.row, 1);
                        var wavelength = data.getValue(selectedItem.row, 0);
                        eval("document.getElementById('" + div + "value" + "').innerHTML = wavelength;");
                    } else (alert('No selecteditem'))
                }

                eval("google.visualization.events.addListener(" + div + ", 'select', selectHandler);");
                google.visualization.events.addListener('chart1', 'select', selectHandler);
                eval(div + ".draw(data, options);");
                eval("drawVAxisLine(" + div + ", line)");
            }


        }

        function drawVAxisLine(chart, value) {
            var layout = chart.getChartLayoutInterface();
            var chartArea = layout.getChartAreaBoundingBox();

            var svg = chart.getContainer().getElementsByTagName('svg')[0];
            var xLoc = layout.getXLocation(value)
            svg.appendChild(createLine(xLoc, chartArea.top + chartArea.height, xLoc, chartArea.top, '#ff0000', 2)); // axis line 
        }

        function createLine(x1, y1, x2, y2, color, w) {
            var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.setAttribute('stroke', color);
            line.setAttribute('stroke-width', w);
            return line;
        }

//sets wavelength
        function saveWavelength(div) {
            eval("var value = document.getElementById('" + div + "value').innerHTML;");
            eval("document.getElementById('" + div + "v1').innerHTML = '" + value + "'");

            //get red shift

          //  var redshift = (+value - 6150) / 6150;
         //   eval("document.getElementById('" + div + "c1').innerHTML = '" + redshift + "';");

        }

//sets flx
        function saveFlux(div) {
            console.log(div);
            eval("var value = document.getElementById('" + div + "bvalue').innerHTML;");
            eval("document.getElementById('" + div + "v2').innerHTML = '" + value + "'");
        }

        function showLight(chart){
            eval(`document.getElementById("${chart}b").classList.remove("hidden");
                document.getElementById("${chart}").classList.add("hidden");`);
        }

        function showSpectra(chart){
            eval(`document.getElementById("${chart}").classList.remove("hidden");
                document.getElementById("${chart}b").classList.add("hidden");`);
        }

        function generateChartDivs() {
            var content = "";

            for(var i=1; i<=10; i++){
            var singleContent = 
            `<div>
            <div id="chart${i}" style="width: 700px; height: 300px;" class="hidden"></div>
            <div id="chart${i}b" style="width: 700px; height: 300px;"></div>
            <span onclick="showLight('chart${i}')">Light Curve</span> | <span onclick="showSpectra('chart${i}')"> Spectra</span><br/>
            <span>Magnitude: </span>
            <span id="chart${i}bvalue"></span>
            <span onClick="saveFlux('chart${i}')">Save</span>
            <br />
            <span>Wavelength: </span><span id="chart${i}value"></span>
            <span onClick="saveWavelength('chart${i}')">Save</span>
        </div>`

            content = content + singleContent;
            }

        document.getElementById("chartContainer").innerHTML = content;

        }

    </script>

    
    <div>
        <br /><br /><br />
        <table id="resultsTable">
            <tr>
                <td></td>
                <td>Magnitude</td>
                <td>Wavelength</td>

                <td>Calc 2</td>
                <td>Calc 3</td>
                <td>Calc 4</td>
            </tr>

        </table>
